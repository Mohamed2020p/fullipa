workflows:

  ios-sideload:
    name: Premium IPTV – Sideload IPA
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Debug environment
        script: |
          #!/bin/bash
          echo "=== Working directory ==="
          pwd
          echo ""
          echo "=== Repo contents ==="
          ls -la
          echo ""
          echo "=== Looking for .xcodeproj ==="
          find . -name "*.xcodeproj" -maxdepth 4
          echo ""
          echo "=== Xcode version ==="
          xcodebuild -version
          echo ""
          echo "=== Available schemes ==="
          find . -name "*.xcodeproj" -maxdepth 4 | while read proj; do
            echo "Schemes in $proj:"
            xcodebuild -project "$proj" -list 2>&1 || true
          done

      - name: Build and package IPA
        script: |
          #!/bin/bash
          set -e

          # Find the project file dynamically — don't assume working directory
          PROJ=$(find "$CM_BUILD_DIR" -name "*.xcodeproj" -maxdepth 5 | head -1)
          PROJ_DIR=$(dirname "$PROJ")
          echo "Project found at: $PROJ"
          echo "Project dir: $PROJ_DIR"
          cd "$PROJ_DIR"

          ARCHIVE="$CM_BUILD_DIR/PremiumIPTV.xcarchive"
          PAYLOAD="$CM_BUILD_DIR/Payload"
          IPA="$CM_BUILD_DIR/PremiumIPTV.ipa"

          echo "=== Step 1: Archive ==="
          xcodebuild archive \
            -project "$PROJ" \
            -scheme PremiumIPTV \
            -configuration Release \
            -archivePath "$ARCHIVE" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY_NAME=""

          echo "=== Step 2: Verify archive ==="
          if [ ! -d "$ARCHIVE" ]; then
            echo "ERROR: archive not created"
            exit 1
          fi
          echo "Archive OK"

          echo "=== Step 3: Find .app ==="
          APP=$(find "$ARCHIVE" -name "*.app" -maxdepth 5 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: no .app found. xcarchive tree:"
            find "$ARCHIVE" -maxdepth 6
            exit 1
          fi
          echo "Found: $APP  ($(du -sh "$APP" | cut -f1))"

          echo "=== Step 4: Pack IPA ==="
          rm -rf "$PAYLOAD"
          mkdir -p "$PAYLOAD"
          cp -R "$APP" "$PAYLOAD/"
          cd "$CM_BUILD_DIR"
          zip -r "PremiumIPTV.ipa" Payload/
          echo "IPA size: $(du -sh "$IPA" | cut -f1)"
          echo "=== Done ==="

    artifacts:
      - $CM_BUILD_DIR/PremiumIPTV.ipa
      - /tmp/xcodebuild_logs/*.log
