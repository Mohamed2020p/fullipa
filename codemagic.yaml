workflows:
  ios-sideload-release:
    name: Premium IPTV iOS Sideload (Ad-Hoc)
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Build App for Sideloadly
        script: |
          # Stop the build immediately if Xcode crashes
          set -e 
          
          # Force Xcode to build the actual binary by using Ad-Hoc signing ("-")
          # This creates a valid app structure without needing Apple API keys.
          xcodebuild clean build \
            -project "PremiumIPTV.xcodeproj" \
            -scheme "PremiumIPTV" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            SYMROOT=$(PWD)/build
          
          echo "Zipping up the raw Payload..."
          mkdir -p Payload
          
          # Grab the actual built app (which will now have the heavy binary inside)
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r PremiumIPTV_Sideloadly.ipa Payload
          
    artifacts:
      - PremiumIPTV_Sideloadly.ipa
      - /tmp/xcodebuild_logs/*.log
