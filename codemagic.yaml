workflows:

  ios-sideload:
    name: Premium IPTV – Sideload IPA
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Debug environment
        script: |
          echo "PWD: $(pwd)"
          echo "HOME: $HOME"
          echo "CM_BUILD_DIR: $CM_BUILD_DIR"
          echo "--- root contents ---"
          ls -la
          echo "--- find xcodeproj ---"
          find / -name "*.xcodeproj" -maxdepth 8 2>/dev/null || true

      - name: Build and package IPA
        script: |
          #!/bin/bash
          set -e

          echo "PWD at start: $(pwd)"

          # Use pwd as the base — Codemagic clones into the working directory
          REPO_ROOT="$(pwd)"

          PROJ=$(find "$REPO_ROOT" -name "*.xcodeproj" -maxdepth 5 | head -1)
          if [ -z "$PROJ" ]; then
            echo "ERROR: no .xcodeproj found under $REPO_ROOT"
            find "$REPO_ROOT" -maxdepth 6
            exit 1
          fi

          PROJ_DIR=$(dirname "$PROJ")
          echo "Project: $PROJ"
          cd "$PROJ_DIR"
          echo "cd into: $(pwd)"

          OUT="$REPO_ROOT/build_output"
          ARCHIVE="$OUT/PremiumIPTV.xcarchive"
          PAYLOAD="$OUT/Payload"
          IPA="$OUT/PremiumIPTV.ipa"
          mkdir -p "$OUT"

          echo "=== Step 1: Archive ==="
          xcodebuild archive \
            -project "$PROJ" \
            -scheme PremiumIPTV \
            -configuration Release \
            -archivePath "$ARCHIVE" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY_NAME=""

          echo "=== Step 2: Verify archive ==="
          if [ ! -d "$ARCHIVE" ]; then
            echo "ERROR: archive not created"
            exit 1
          fi
          echo "Archive OK"

          echo "=== Step 3: Find .app ==="
          APP=$(find "$ARCHIVE" -name "*.app" -maxdepth 5 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: no .app found. xcarchive contents:"
            find "$ARCHIVE" -maxdepth 6
            exit 1
          fi
          echo "Found: $APP  ($(du -sh "$APP" | cut -f1))"

          echo "=== Step 4: Pack IPA ==="
          rm -rf "$PAYLOAD"
          mkdir -p "$PAYLOAD"
          cp -R "$APP" "$PAYLOAD/"
          cd "$OUT"
          zip -r "PremiumIPTV.ipa" Payload/
          echo "IPA size: $(du -sh "$IPA" | cut -f1)"
          echo "=== Done ==="

    artifacts:
      - "**/build_output/PremiumIPTV.ipa"
      - /tmp/xcodebuild_logs/*.log
