workflows:
  ios-sideload-release:
    name: Premium IPTV iOS Sideload (Forced Manual)
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Build App for Sideloadly
        script: |
          set -e 
          
          # إجبار Xcode على استخدام التوقيع اليدوي وتجاهل إعدادات المشروع التلقائية
          xcodebuild clean build \
            -project "PremiumIPTV.xcodeproj" \
            -scheme "PremiumIPTV" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_ENTITLEMENTS="" \
            SYMROOT=$(PWD)/build
          
          echo "تحقق من وجود الملف التنفيذي..."
          # هذا السطر سيفشل البناء إذا لم يجد ملفاً تنفيذياً كبيراً، لضمان عدم حصولك على ملف فارغ مرة أخرى
          find build/Release-iphoneos -name "*.app" -exec ls -lh {} \;
          
          echo "Packaging..."
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/
          
          echo "حجم الملف النهائي:"
          du -sh Payload/*.app
          
          zip -r PremiumIPTV_Sideloadly.ipa Payload
          
    artifacts:
      - PremiumIPTV_Sideloadly.ipa
      - /tmp/xcodebuild_logs/*.log
