workflows:

  ios-sideload:
    name: Premium IPTV – Sideload IPA
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Archive
        script: |
          xcodebuild archive \
            -project PremiumIPTV.xcodeproj \
            -scheme PremiumIPTV \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/PremiumIPTV.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Write ExportOptions.plist
        script: |
          cat > "$CM_BUILD_DIR/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/PremiumIPTV.xcarchive" \
            -exportPath "$CM_BUILD_DIR/export" \
            -exportOptionsPlist "$CM_BUILD_DIR/ExportOptions.plist" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

          # Fallback: if exportArchive didn't produce an IPA (no signing),
          # manually pack it from the xcarchive
          if [ ! -f "$CM_BUILD_DIR/export/PremiumIPTV.ipa" ]; then
            APP=$(find "$CM_BUILD_DIR/PremiumIPTV.xcarchive" -name "*.app" | head -1)
            echo "exportArchive skipped IPA, packing manually from: $APP"
            mkdir -p "$CM_BUILD_DIR/export/Payload"
            cp -R "$APP" "$CM_BUILD_DIR/export/Payload/"
            cd "$CM_BUILD_DIR/export"
            zip -r "PremiumIPTV.ipa" Payload/
            echo "Packed IPA size: $(du -sh PremiumIPTV.ipa | cut -f1)"
          fi

    artifacts:
      - $CM_BUILD_DIR/export/PremiumIPTV.ipa
      - /tmp/xcodebuild_logs/*.log
