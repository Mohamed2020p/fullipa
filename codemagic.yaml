workflows:
  ios-release:
    name: Premium IPTV iOS Release
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.c0derz.premiumiptv"
        XCODE_PROJECT: "PremiumIPTV.xcodeproj"
        XCODE_SCHEME: "PremiumIPTV"
      # Add these as encrypted env vars in Codemagic UI:
      # APP_STORE_CONNECT_ISSUER_ID
      # APP_STORE_CONNECT_KEY_IDENTIFIER
      # APP_STORE_CONNECT_PRIVATE_KEY
      # CERTIFICATE_PRIVATE_KEY
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-debug:
    name: Premium IPTV iOS Debug (no signing)
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Build (unsigned, simulator)
        script: |
          xcodebuild \
            -project PremiumIPTV.xcodeproj \
            -scheme PremiumIPTV \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty
    artifacts:
      - /tmp/xcodebuild_logs/*.log
