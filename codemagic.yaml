workflows:
  ios-sideload-release:
    name: Premium IPTV iOS Sideload (Forced)
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Build App for Sideloadly
        script: |
          set -e 
          
          # We add these extra flags to override internal Xcode project settings
          # that usually cause Code 65 errors.
          xcodebuild clean build \
            -project "PremiumIPTV.xcodeproj" \
            -scheme "PremiumIPTV" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SYMROOT=$(PWD)/build
          
          echo "Packaging..."
          mkdir -p Payload
          
          # Copy the app to the Payload folder
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r PremiumIPTV_Sideloadly.ipa Payload
          
    artifacts:
      - PremiumIPTV_Sideloadly.ipa
      - /tmp/xcodebuild_logs/*.log
