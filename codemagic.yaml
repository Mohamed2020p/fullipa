workflows:
  ios-sideload-release:
    name: Premium IPTV iOS Sideload (No Signing)
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "PremiumIPTV.xcodeproj"
        XCODE_SCHEME: "PremiumIPTV"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install CocoaPods
        script: |
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "No Podfile found, skipping..."
          fi
          
      - name: Build Unsigned App for Sideloadly
        script: |
          # Compile the app for a real iPhone but strictly disable ALL Apple signing
          if [ -d "PremiumIPTV.xcworkspace" ]; then
            xcodebuild clean build \
              -workspace "PremiumIPTV.xcworkspace" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_IDENTITY="" \
              SYMROOT=$(PWD)/build | xcpretty
          else
            xcodebuild clean build \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_IDENTITY="" \
              SYMROOT=$(PWD)/build | xcpretty
          fi
          
          # Manually package the raw code into an .ipa file format for Sideloadly
          mkdir -p Payload
          cp -r build/Release-iphoneos/PremiumIPTV.app Payload/
          zip -r PremiumIPTV_unsigned_sideload.ipa Payload
          
    artifacts:
      - PremiumIPTV_unsigned_sideload.ipa
      - /tmp/xcodebuild_logs/*.log
