workflows:

  ios-sideload:
    name: Premium IPTV – Sideload IPA
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Build and package IPA
        script: |
          #!/bin/bash
          set -e  # stop immediately if any command fails

          ARCHIVE="$CM_BUILD_DIR/PremiumIPTV.xcarchive"
          PAYLOAD="$CM_BUILD_DIR/Payload"
          IPA="$CM_BUILD_DIR/PremiumIPTV.ipa"

          echo "=== Step 1: Archive ==="
          xcodebuild archive \
            -project PremiumIPTV.xcodeproj \
            -scheme PremiumIPTV \
            -configuration Release \
            -archivePath "$ARCHIVE" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "=== Step 2: Verify archive exists ==="
          if [ ! -d "$ARCHIVE" ]; then
            echo "ERROR: Archive was not created. Check build logs above."
            exit 1
          fi
          echo "Archive OK: $ARCHIVE"

          echo "=== Step 3: Find .app inside archive ==="
          APP=$(find "$ARCHIVE" -name "*.app" -maxdepth 4 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found inside xcarchive. Archive contents:"
            find "$ARCHIVE" -maxdepth 5
            exit 1
          fi
          echo "Found .app at: $APP"
          echo "App size: $(du -sh "$APP" | cut -f1)"

          echo "=== Step 4: Package into IPA ==="
          rm -rf "$PAYLOAD"
          mkdir -p "$PAYLOAD"
          cp -R "$APP" "$PAYLOAD/"
          cd "$CM_BUILD_DIR"
          zip -r "PremiumIPTV.ipa" Payload/
          echo "IPA size: $(du -sh "$IPA" | cut -f1)"

          echo "=== Done ==="

    artifacts:
      - $CM_BUILD_DIR/PremiumIPTV.ipa
      - /tmp/xcodebuild_logs/*.log
