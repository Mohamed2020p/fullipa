workflows:
  ios-release-manual:
    name: Premium IPTV iOS Release (NO API)
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_PROJECT: "PremiumIPTV.xcodeproj"
        XCODE_SCHEME: "PremiumIPTV"
        # We ripped out the API. You will upload the raw files to Codemagic UI instead:
        # CM_CERTIFICATE (This will be your .p12 file)
        # CM_CERTIFICATE_PASSWORD (The password for your .p12)
        # CM_PROVISIONING_PROFILE (This will be your .mobileprovision file)
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up manual code signing (No Apple API)
        script: |
          keychain initialize
          keychain add-certificates \
            --certificate "$CM_CERTIFICATE" \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          xcode-project use-profiles --profile "$CM_PROVISIONING_PROFILE"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
